<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Peaceful Hug For V 🤍</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 class="fade">V 🤍</h1>

    <p class="fade delay1">
        Sometimes I don’t need loud words…
        I don’t need big promises…
    </p>

    <p class="fade delay2">
        I just need you.
        Standing close to me.
        Feeling your presence.
    </p>

    <p class="fade delay3">
        When you hug me,
        the world becomes quiet…
        My heart slows down…
        and everything feels safe. 🫂
    </p>

    <button id="hugBtn" class="fade delay4">
        Come Into My Arms 🤍
    </button>
</div>

<div class="hearts"></div>

<script src="script.js"></script>
</body>
</html>
